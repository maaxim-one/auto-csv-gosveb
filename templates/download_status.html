<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Скачивание готово</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <script>
    (function() {
      const t = localStorage.getItem('theme');
      if (t) document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .status-card {
      max-width: 520px;
      width: 100%;
      text-align: center;
    }
    .status-icon {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--success-light);
      color: var(--success);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 16px;
      animation: scaleIn 0.4s ease-out both;
    }
    .status-card h1 {
      font-size: 1.125rem;
      margin-bottom: 8px;
    }
    .status-card p {
      color: var(--text-secondary);
      font-size: 0.875rem;
      margin: 0 0 20px 0;
      line-height: 1.6;
    }
    .file-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 24px;
    }
    .file-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 16px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .file-info {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 2px;
      min-width: 0;
      flex: 1;
    }
    .file-name {
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
    }
    .file-size {
      font-size: 0.75rem;
      color: var(--text-muted);
    }
    .status-actions {
      display: flex;
      gap: 10px;
      justify-content: center;
    }
    .file-item .btn-icon {
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="card status-card">
    <div class="status-icon">&#10003;</div>
    <h1>Скачивание готово</h1>
    {% if files|length > 1 %}
      <p>Архив разбит на {{ files|length }} частей (каждая не более 90 МБ).</p>
    {% else %}
      <p>Архив собран и готов к скачиванию.</p>
    {% endif %}

    <div class="file-list" id="file-list">
      {% for item in files %}
        <div class="file-item animate-in animate-in-delay-{{ loop.index0 }}" data-filename="{{ item.filename }}">
          <div class="file-info">
            <span class="file-name">{{ item.filename }}</span>
            <span class="file-size">{{ item.size_mb }} МБ</span>
          </div>
          <a href="{{ url_for('serve_download', filename=item.filename) }}" class="btn btn-primary btn-icon download-btn" title="Скачать">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/>
              <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
          </a>
        </div>
      {% endfor %}
    </div>

    <div class="status-actions">
      <a href="{{ url_for('index') }}" class="btn btn-secondary">На главную</a>
    </div>
  </div>
  <script>
    document.querySelectorAll('.download-btn').forEach(btn => {
      btn.addEventListener('click', function(e) {
        const item = this.closest('.file-item');
        if (!item) return;

        this.classList.add('loading');
        this.innerHTML = '<span class="spinner"></span>';

        const href = this.getAttribute('href');
        const a = document.createElement('a');
        a.href = href;
        a.style.display = 'none';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);

        setTimeout(() => {
          item.classList.add('hiding');
          item.addEventListener('animationend', () => {
            item.remove();
            const list = document.getElementById('file-list');
            if (list && list.children.length === 0) {
              list.innerHTML = '<p style="color:var(--text-muted); font-size:0.875rem; margin:0;">Все файлы скачаны</p>';
            }
          }, { once: true });
        }, 600);

        e.preventDefault();
      });
    });
  </script>
</body>
</html>
